{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-body text-center">

                    <!-- Profile Image -->

                    {% if user.profile_pic == "default.png" %}

                    <img
                        src="https://ui-avatars.com/api/?name={{ user.name }}&background=2563eb&color=fff&size=200"
                        class="rounded-circle shadow mb-4"
                        width="170"
                        height="170"
                        alt="Profile">

                    {% else %}

                    <img
                        src="{{ url_for('static', filename='uploads/' + user.profile_pic) }}"
                        class="rounded-circle shadow mb-4"
                        width="170"
                        height="170"
                        alt="Profile">

                    {% endif %}

                    <!-- Upload Form -->

                    <form
                        method="POST"
                        action="/upload_profile"
                        enctype="multipart/form-data"
                        class="mb-4">

                        <div class="mb-3">

                            <input
                                type="file"
                                name="profile"
                                class="form-control"
                                accept="image/*"
                                required>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-success">

                            <i class="bi bi-upload"></i>

                            Upload Photo

                        </button>

                    </form>

                    <hr>

                    <!-- User Details -->

                    <h2 class="fw-bold">
                        {{ user.name }}
                    </h2>

                    <p class="text-muted">
                        {{ user.email }}
                    </p>

                    <hr>

                    <div class="row">

                        <div class="col-md-4 mb-3">

                            <div class="card p-3 h-100">

                                <i class="bi bi-person-fill display-5 text-primary"></i>

                                <h5 class="mt-3">
                                    Name
                                </h5>

                                <p>{{ user.name }}</p>

                            </div>

                        </div>

                        <div class="col-md-4 mb-3">

                            <div class="card p-3 h-100">

                                <i class="bi bi-envelope-fill display-5 text-success"></i>

                                <h5 class="mt-3">
                                    Email
                                </h5>

                                <p>{{ user.email }}</p>

                            </div>

                        </div>

                        <div class="col-md-4 mb-3">

                            <div class="card p-3 h-100">

                                <i class="bi bi-patch-check-fill display-5 text-warning"></i>

                                <h5 class="mt-3">
                                    Status
                                </h5>

                                <p>Active User</p>

                            </div>

                        </div>

                    </div>

                    <!-- Buttons -->

                    <div class="mt-5">

                        <a
                            href="/edit_profile"
                            class="btn btn-warning btn-lg me-2">

                            <i class="bi bi-pencil-square"></i>

                            Edit Profile

                        </a>

                        <a
                            href="/change_password"
                            class="btn btn-secondary btn-lg me-2">

                            <i class="bi bi-key-fill"></i>

                            Change Password

                        </a>

                        <a
                            href="/dashboard"
                            class="btn btn-primary btn-lg me-2">

                            <i class="bi bi-speedometer2"></i>

                            Dashboard

                        </a>

                        <a
                            href="/logout"
                            class="btn btn-danger btn-lg">

                            <i class="bi bi-box-arrow-right"></i>

                            Logout

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
