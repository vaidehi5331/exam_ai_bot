{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow-lg border-0 rounded-4 p-4">

            <div class="text-center mb-4">

                <i class="bi bi-person-plus-fill display-1 text-success"></i>

                <h2 class="fw-bold mt-3">
                    Create Your Account
                </h2>

                <p class="text-muted">
                    Join Exam AI Bot and start your AI-powered learning journey.
                </p>

            </div>

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Full Name
                    </label>

                    <input
                        type="text"
                        name="name"
                        class="form-control form-control-lg"
                        placeholder="Enter your full name"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Email Address
                    </label>

                    <input
                        type="email"
                        name="email"
                        class="form-control form-control-lg"
                        placeholder="Enter your email"
                        required>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Password
                    </label>

                    <input
                        type="password"
                        name="password"
                        class="form-control form-control-lg"
                        placeholder="Create a password"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn btn-success btn-lg w-100">

                    <i class="bi bi-person-check-fill"></i>
                    Create Account

                </button>

            </form>

            <hr>

            <div class="text-center">

                Already have an account?

                <a href="/login">
                    Login
                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
