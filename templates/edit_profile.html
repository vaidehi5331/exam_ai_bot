{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-body">

                    <h2 class="text-center mb-4">
                        ✏ Edit Profile
                    </h2>

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">
                                Name
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                name="name"
                                value="{{ user.name }}"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input
                                type="email"
                                class="form-control"
                                name="email"
                                value="{{ user.email }}"
                                required>

                        </div>

                        <div class="d-grid">

                            <button
                                class="btn btn-primary btn-lg">

                                Update Profile

                            </button>

                        </div>

                    </form>

                    <div class="text-center mt-4">

                        <a href="/profile"
                           class="btn btn-outline-secondary">

                            Back to Profile

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
