<!DOCTYPE html>
<html>
<head>
    <title>Exam AI Bot</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<h1>AI Chatbot</h1>

<form method="POST">

<input type="text"
       name="question"
       placeholder="Ask anything">

<br><br>

<button type="submit">
Ask AI
</button>

</form>

{% if answer %}

<h3>Answer:</h3>

<p>{{ answer }}</p>

{% endif %}
<h2>Exam Preparation AI Assistant</h2>

<p>
Ask questions related to UPSC, SSC, Banking,
Aptitude, Reasoning, GK and Current Affairs
</p>

</body>

</html>
