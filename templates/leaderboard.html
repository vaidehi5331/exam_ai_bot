<!DOCTYPE html>
<html>

<head>
    <title>Exam AI Bot</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<h1>Leaderboard</h1>

<table class="table table-bordered table-striped">

<tr>
    <th>Name</th>
    <th>Topic</th>
    <th>Score</th>
</tr>

{% for item in scores %}

<tr>

<td>{{ item.username }}</td>

<td>{{ item.topic }}</td>

<td>{{ item.score }}</td>

</tr>

{% endfor %}

</table>

</body>

</html>
