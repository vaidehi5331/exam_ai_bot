<!DOCTYPE html>
<html>
<head>
    <title>Exam AI Bot</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<h1>Generate MCQ Questions</h1>

<form method="POST">

<input type="text"
       name="topic"
       placeholder="Enter Topic">

<br><br>

<button type="submit">
Generate MCQ
</button>

</form>

{% if questions %}

<h3>Generated Questions:</h3>

<pre>{{ questions }}</pre>

{% endif %}

</body>

</html>
