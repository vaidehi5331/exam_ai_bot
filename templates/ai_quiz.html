<!DOCTYPE html>
<html>
<head>
    <title>Exam AI Bot</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>      
<body>

<h1>AI Generated Quiz</h1>

<form method="POST" action="/submit_ai_quiz">

{% for q in questions %}

{% set q_index = loop.index %}

<p>{{ q.question }}</p>

{% for option in q.options %}

<input type="radio"
       name="q{{ q_index }}"
       value="{{ option }}">

{{ option }}

<br>

{% endfor %}

<br>

{% endfor %}

<button type="submit">
Submit Quiz
</button>

</form>

</body>
</html>
