{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <div class="text-center mb-5">

        <h1 class="fw-bold text-success">
            <i class="bi bi-patch-question-fill"></i>
            AI Generated Quiz
        </h1>

        <p class="text-muted">
            Read each question carefully and select the correct answer.
        </p>

    </div>

    <!-- Progress -->
    <div class="progress mb-5" style="height:12px;">

        <div class="progress-bar bg-success"
             style="width:100%">
        </div>

    </div>

    <form method="POST" action="/submit_ai_quiz">

        {% for q in questions %}

        {% set q_index = loop.index %}

        <div class="card mb-4 shadow-sm">

            <div class="card-body">

                <h4 class="fw-bold mb-4">

                    Question {{ loop.index }}

                </h4>

                <h5 class="mb-4">

                    {{ q.question }}

                </h5>

                {% for option in q.options %}

                <div class="form-check mb-3">

                    <input
                        class="form-check-input"
                        type="radio"
                        name="q{{ q_index }}"
                        id="q{{ q_index }}_{{ loop.index }}"
                        value="{{ option }}"
                        required>

                    <label
                        class="form-check-label"
                        for="q{{ q_index }}_{{ loop.index }}">

                        {{ option }}

                    </label>

                </div>

                {% endfor %}

            </div>

        </div>

        {% endfor %}

        <div class="text-center mt-5">

            <button
                type="submit"
                class="btn btn-success btn-lg px-5">

                <i class="bi bi-check-circle-fill"></i>

                Submit Quiz

            </button>

        </div>

    </form>

</div>

{% endblock %}
