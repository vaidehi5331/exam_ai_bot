<!DOCTYPE html>
<html>

<head>
    <title>Exam AI Bot</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<h1>Quiz Generator</h1>

<form method="POST">

<input type="text"
       name="topic"
       placeholder="Enter topic">

<br><br>

<button type="submit">
Start Quiz
</button>

</form>

{% if quiz %}

<h3>Quiz Questions</h3>

<pre>{{ quiz }}</pre>

{% endif %}

</body>
</html>
