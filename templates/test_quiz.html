<!DOCTYPE html>
<html>

<head>
    <title>Exam AI Bot</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<h1>Quiz Test</h1>

<form method="POST" action="/submit_quiz">

{% for q in questions %}

<p>{{ q.question }}</p>

<input type="radio"
       name="{{ loop.index }}"
       value="{{ q.options[0] }}"> {{ q.options[0] }}

<br>

<input type="radio"
       name="{{ loop.index }}"
       value="{{ q.options[1] }}"> {{ q.options[1] }}

<br>

<input type="radio"
       name="{{ loop.index }}"
       value="{{ q.options[2] }}"> {{ q.options[2] }}

<br>

<input type="radio"
       name="{{ loop.index }}"
       value="{{ q.options[3] }}"> {{ q.options[3] }}

<br><br>

{% endfor %}

<button type="submit">
Submit Quiz
</button>

</form>

</body>
</html>
